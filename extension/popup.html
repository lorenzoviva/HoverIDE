<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup">
    <div class="popup-header">
        <span class="popup-logo">H</span>
        <span class="popup-title">HoverIDE</span>
        <span class="popup-status" id="status-dot"></span>
    </div>

    <div class="popup-section" id="section-project">
        <label class="popup-label">Project</label>
        <select id="project-select">
            <option value="">— select —</option>
        </select>
    </div>

    <div class="popup-section" id="section-system" style="display:none">
        <label class="popup-label">Active system</label>
        <div id="system-list" class="system-list"></div>
    </div>

    <div class="popup-section">
        <button class="btn btn-primary" id="inject-btn" disabled>
            Inject IDE
        </button>
        <button class="btn btn-ghost" id="eject-btn" style="display:none">
            Eject
        </button>
    </div>

    <div class="popup-footer">
        <span id="active-url" class="popup-url"></span>
    </div>
</div>
<script src="popup.js"></script>
</body>
</html>
